session_name: structured-agents-v2
windows:
  - window_name: structured-agents-v2
    layout: main-vertical
    options:
      main-pane-width: 20%
    panes:
      - shell_command:
          - cd ~/Documents/Projects/structured-agents-v2
          # - nvim Notes.md ToDo.md
          - open-project
      - shell_command:
          - tmux resizep -y 85%
          - filelist-open "startup_files.txt" structured-agents-v2
        focus: true
      - clear
